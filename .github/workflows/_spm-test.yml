name: _spm-test

on:
  workflow_call:

defaults:
  run:
    shell: bash -l {0}

jobs:
  spm-test-build:
    name: SwiftPM Test Build
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup SwiftPM workspace
        uses: ./.github/actions/spm-setup

      - name: Cache iOS Simulator Runtime
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/CoreSimulator/Profiles/Runtimes
            ~/Library/Caches/com.apple.dt.Xcode/Downloads
          key: ios-simulator-18.0-${{ runner.os }}-${{ runner.arch }}

      - name: Setup iOS Simulator
        run: |
          # Check if runtime already exists
          if ! xcrun simctl list runtimes | grep -q "iOS 18.0"; then
            xcodebuild -downloadPlatform iOS -exportPath ~/Downloads -buildVersion 18.0
          else
            echo "iOS 18.0 runtime already available"
          fi

          # Create simulator if it doesn't exist
          if ! xcrun simctl list devices | grep -q "iPhone 12 mini"; then
            xcrun simctl create 'iPhone 12 mini' 'iPhone 12 mini' iOS18.0
          else
            echo "iPhone 12 mini simulator already exists"
          fi

      - name: Run Backpack Swift Package tests
        env:
          SPM_DESTINATION: platform=iOS Simulator,name=iPhone 12 mini,OS=18.0
        run: |
          set -eo pipefail
          xcodebuild \
            -workspace .swiftpm/xcode/package.xcworkspace \
            -scheme Backpack-Package \
            -destination "$SPM_DESTINATION" \
            -derivedDataPath .derivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            test

      - name: Clean derived data
        if: always()
        run: rm -rf .derivedData
