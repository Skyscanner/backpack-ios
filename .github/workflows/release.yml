name: release

on:
  release:
    types: [ published ]

defaults:
  run:
    shell: bash -l {0}

jobs:
  Build:
      name: Build
      permissions:
        statuses: write
        pull-requests: write
      uses: ./.github/workflows/_build.yml
      secrets:
        GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
  Deploy-Common:
    name: Release Common to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v6.0.3
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack Common
      run: |  
        set -eo pipefail
        SPEC="Backpack-Common.podspec" # change per job
        LOG_FILE="$(mktemp)"
        attempts=0
        max_attempts=3

        while [ $attempts -lt $max_attempts ]; do
          if bundle exec pod trunk push "$SPEC" --allow-warnings --skip-tests --synchronous 2>&1 | tee "$LOG_FILE"; then
            break
          fi

          # Idempotency: if already published, treat as success
          if grep -Eqi "already exists|unable to accept duplicate entry|version.*exists" "$LOG_FILE"; then
            echo "Version already published on CocoaPods trunk; treating as success."
            break
          fi

          attempts=$((attempts+1))
          echo "trunk push failed (attempt $attempts/$max_attempts), retrying..."
          sleep $((attempts * 20))
        done

        if [ $attempts -ge $max_attempts ]; then
          echo "trunk push failed after $max_attempts attempts"
          exit 1
        fi

        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-UIKit:
    name: Release UIKit to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v6.0.3
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack UIKit
      run: |
        set -eo pipefail
        SPEC="Backpack.podspec" # change per job
        LOG_FILE="$(mktemp)"
        attempts=0
        max_attempts=3

        while [ $attempts -lt $max_attempts ]; do
          if bundle exec pod trunk push "$SPEC" --allow-warnings --skip-tests --synchronous 2>&1 | tee "$LOG_FILE"; then
            break
          fi

          # Idempotency: if already published, treat as success
          if grep -Eqi "already exists|unable to accept duplicate entry|version.*exists" "$LOG_FILE"; then
            echo "Version already published on CocoaPods trunk; treating as success."
            break
          fi

          attempts=$((attempts+1))
          echo "trunk push failed (attempt $attempts/$max_attempts), retrying..."
          sleep $((attempts * 20))
        done

        if [ $attempts -ge $max_attempts ]; then
          echo "trunk push failed after $max_attempts attempts"
          exit 1
        fi

        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-SwiftUI:
    name: Release SwiftUI to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v6.0.3
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack SwiftUI
      run: |
        set -eo pipefail
        SPEC="Backpack-SwiftUI.podspec" # change per job
        LOG_FILE="$(mktemp)"
        attempts=0
        max_attempts=3

        while [ $attempts -lt $max_attempts ]; do
          if bundle exec pod trunk push "$SPEC" --allow-warnings --skip-tests --synchronous 2>&1 | tee "$LOG_FILE"; then
            break
          fi

          # Idempotency: if already published, treat as success
          if grep -Eqi "already exists|unable to accept duplicate entry|version.*exists" "$LOG_FILE"; then
            echo "Version already published on CocoaPods trunk; treating as success."
            break
          fi

          attempts=$((attempts+1))
          echo "trunk push failed (attempt $attempts/$max_attempts), retrying..."
          sleep $((attempts * 20))
        done

        if [ $attempts -ge $max_attempts ]; then
          echo "trunk push failed after $max_attempts attempts"
          exit 1
        fi

        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-Docs:
    name: Release Backpack Docs
    runs-on: macos-15
    environment: Publishing
    needs: [Deploy-SwiftUI, Deploy-UIKit, Deploy-Common]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v6.0.3
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Pod Install
      run: bundle exec pod install
      working-directory: Example

    - name: Install sourcekitten
      run: brew install sourcekitten

    - name: Build and verify docs (release)
      if: github.event.release.tag_name != ''
      run: ./scripts/build-docs $RELEASE_VERSION
      env:
        RELEASE_VERSION: ${{ github.event.release.tag_name }}

    - name: Deploy code documentation
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        personal_token: ${{ secrets.DEPLOY_TOKEN }}
        publish_dir: docs/
        keep_files: true
        external_repository: backpack/ios
        publish_branch: main

  SupernovaPublish:
    runs-on: ubuntu-22.04
    environment: Publishing
    steps:
      - name: Update Supernova docs
        run: npx @supernovaio/cli publish-documentation --apiKey=${{ secrets.SUPERNOVA_API_KEY }} --designSystemId=${{ secrets.SUPERNOVA_DESIGN_SYSTEM_ID }}
