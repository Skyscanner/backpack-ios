name: release

on:
  release:
    types: [ published ]

defaults:
  run:
    shell: bash -l {0}

jobs:
  Build:
      name: Build
      permissions:
        statuses: write
        pull-requests: write
      uses: ./.github/workflows/_build.yml
      secrets:
        GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}

  Deploy-Common:
    name: Release Common to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v7.0.0
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack Common
      run: |
        set -euo pipefail

        push_with_retry() {
          local spec="$1"
          local attempts=1
          local max_attempts=3
          local log_file
          log_file="$(mktemp)"

          while true; do
            echo "Publishing ${spec} (attempt ${attempts}/${max_attempts})"

            if bundle exec pod trunk push "${spec}" --allow-warnings --skip-tests --synchronous 2>&1 | tee "${log_file}"; then
              echo "Successfully published ${spec}"
              return 0
            fi

            # Idempotency for manual reruns: consider duplicate version as success.
            if grep -Eqi "already exists|unable to accept duplicate entry|version .* exists" "${log_file}"; then
              echo "Version for ${spec} already exists on trunk; treating as success."
              return 0
            fi

            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "pod trunk push failed after ${max_attempts} attempts for ${spec}"
              return 1
            fi

            sleep_seconds=$((attempts * 20))
            echo "pod trunk push failed for ${spec}; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempts=$((attempts + 1))
          done
        }

        push_with_retry "Backpack-Common.podspec"
        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-UIKit:
    name: Release UIKit to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v7.0.0
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack UIKit
      run: |
        set -euo pipefail

        push_with_retry() {
          local spec="$1"
          local attempts=1
          local max_attempts=3
          local log_file
          log_file="$(mktemp)"

          while true; do
            echo "Publishing ${spec} (attempt ${attempts}/${max_attempts})"

            if bundle exec pod trunk push "${spec}" --allow-warnings --skip-tests --synchronous 2>&1 | tee "${log_file}"; then
              echo "Successfully published ${spec}"
              return 0
            fi

            if grep -Eqi "already exists|unable to accept duplicate entry|version .* exists" "${log_file}"; then
              echo "Version for ${spec} already exists on trunk; treating as success."
              return 0
            fi

            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "pod trunk push failed after ${max_attempts} attempts for ${spec}"
              return 1
            fi

            sleep_seconds=$((attempts * 20))
            echo "pod trunk push failed for ${spec}; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempts=$((attempts + 1))
          done
        }

        push_with_retry "Backpack.podspec"
        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-SwiftUI:
    name: Release SwiftUI to Cocoapods
    runs-on: macos-15
    environment: Publishing
    needs: [Build]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v7.0.0
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Select Xcode 16
      run: sudo xcode-select --switch /Applications/Xcode_16.4.app

    - name: Publish Pods - Backpack SwiftUI
      run: |
        set -euo pipefail

        push_with_retry() {
          local spec="$1"
          local attempts=1
          local max_attempts=3
          local log_file
          log_file="$(mktemp)"

          while true; do
            echo "Publishing ${spec} (attempt ${attempts}/${max_attempts})"

            if bundle exec pod trunk push "${spec}" --allow-warnings --skip-tests --synchronous 2>&1 | tee "${log_file}"; then
              echo "Successfully published ${spec}"
              return 0
            fi

            if grep -Eqi "already exists|unable to accept duplicate entry|version .* exists" "${log_file}"; then
              echo "Version for ${spec} already exists on trunk; treating as success."
              return 0
            fi

            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "pod trunk push failed after ${max_attempts} attempts for ${spec}"
              return 1
            fi

            sleep_seconds=$((attempts * 20))
            echo "pod trunk push failed for ${spec}; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempts=$((attempts + 1))
          done
        }

        push_with_retry "Backpack-SwiftUI.podspec"
        bundle exec pod repo update
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        LIB_VERSION: ${{ github.event.release.tag_name }}

  Deploy-Docs:
    name: Release Backpack Docs
    runs-on: macos-15
    environment: Publishing
    needs: [Deploy-SwiftUI, Deploy-UIKit, Deploy-Common]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v7.0.0
      with:
        ref: main

    - name: Set up node and ruby
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Bundle Install
      run: bundle install --jobs 4 --retry 3

    - name: Pod Install
      run: bundle exec pod install
      working-directory: Example

    - name: Install sourcekitten
      run: brew install sourcekitten

    - name: Build and verify docs (release)
      if: github.event.release.tag_name != ''
      run: ./scripts/build-docs $RELEASE_VERSION
      env:
        RELEASE_VERSION: ${{ github.event.release.tag_name }}

    - name: Deploy code documentation
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        personal_token: ${{ secrets.DEPLOY_TOKEN }}
        publish_dir: docs/
        keep_files: true
        external_repository: backpack/ios
        publish_branch: main

  SupernovaPublish:
    runs-on: ubuntu-22.04
    environment: Publishing
    steps:
      - name: Update Supernova docs
        run: npx @supernovaio/cli publish-documentation --apiKey=${{ secrets.SUPERNOVA_API_KEY }} --designSystemId=${{ secrets.SUPERNOVA_DESIGN_SYSTEM_ID }}
